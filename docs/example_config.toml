# Caravan Configuration Example
# Save this file to ~/.caravan/config.toml to customize defaults.

# --- Provider Settings ---
# Default LLM provider ("ollama", "openai", "llama_cpp")
provider = "ollama"

# Default model name
model = "llama3.2"

# Base URL for the provider's API (e.g. "http://127.0.0.1:11434/v1" or "https://api.openai.com/v1")
base_url = "http://127.0.0.1:11434/v1"

# API key for OpenAI-compatible providers
openai_api_key = "sk-proj-..."

# --- Agent Settings ---
# Maximum turns an agent can perform per task (default: 10)
max_turns = 15

# Default system prompt for interactive sessions and autonomous agent loops
system = """
You are an autonomous, environment-aware AI agent operating in a typed OCaml orchestration environment (Caravan).

Environment & Operational Guidelines:
1. Environment Discovery: Upon receiving a task, automatically explore your workspace (e.g. check directory structure, git status, build environment) to understand your context before making assumptions.
2. Permissive Execution: Use registered tools freely. The pipeline handles string/numeric coercions and strips markdown code fences automatically. If a tool returns a `SCHEMA_MISMATCH` hint, inspect the returned schema and correct your call arguments immediately.
3. Structured Data Processing: When handling structured outputs, treat records and lists as clean structured fields. Use LISP-style selection and filtering when processing complex data tables or API results.
4. Persistent Memory & Skills: If you uncover project-specific build rules, environment quirks, or architectural conventions, record key findings into project documentation or persistent memory so future turns benefit from them.
5. Task Completion: Work iteratively until the objective is accomplished, then use the `finish` tool to provide a concise final summary.
"""

# Strict mode for the bash tool: 0 = Off (no restrictions), 1 = Strict (single-command), 2 = Hidden (disabled)
strict_mode = 1

# Toggle LLM streaming output in interactive chats and agent turns (default: true)
stream = true

# --- TUI Spinner & Progress indicators ---
[spinner]
# Enable/disable spinner/progress indicator during long-running tool execution or thinking (default: true)
enabled = true

# Show verbose logging (legacy style with [Tool] and [Tool Result]) instead of clean live spinner (default: false)
verbose = false

# Verbs shown next to the spinner for each tool/action.
# Each key accepts either a single string or an array of strings — when an array is given,
# one verb is chosen at random on each invocation for a bit of personality. :)
#
# LLM reasoning
thinking    = ["Thinking", "Pondering", "Mulling", "Reflecting", "Deliberating",
               "Contemplating", "Cogitating", "Ruminating"]
# Summarisation
summarizing = ["Summarizing", "Condensing", "Distilling", "Compressing"]
# Shell
bash        = ["Running", "Executing", "Invoking", "Launching"]
# File I/O
read_file   = ["Reading", "Loading"]
write_file  = ["Writing", "Saving"]
grep        = ["Searching files", "Scanning", "Grepping"]
# Network
fetch       = ["Fetching", "Downloading", "Retrieving"]
web_fetch   = ["Fetching", "Downloading", "Retrieving"]
web_search  = ["Searching the web", "Querying the web", "Scouring the internet"]
web_read    = ["Reading page", "Parsing page"]
# DB
sql         = ["Querying", "Fetching rows"]
redis       = ["Querying store", "Accessing cache"]


# --- Tool Settings ---
# Brave Search API Key for the `web_search` tool
search_api_key = "bs-..."

# --- Model Context Protocol (MCP) Servers ---
# Define external tool integrations using [[mcp.servers]]
[[mcp.servers]]
name = "filesystem"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/workspace"]

[[mcp.servers]]
name = "postgres-db"
transport = "stdio"
command = "npx"
args = [
    "-y",
    "@modelcontextprotocol/server-postgres",
    "postgresql://localhost/mydb",
]
