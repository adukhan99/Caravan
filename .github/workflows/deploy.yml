name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render Mermaid Diagrams
        run: ./scripts/render_docs.sh

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
          apt-packages: libssl-dev libgmp-dev pkg-config

      - name: Install Dependencies
        run: |
          opam pin add -n Caravan .
          opam install . --deps-only --with-doc -y

      - name: Build Documentation
        run: opam exec -- dune build @doc

      - name: Prepare Deployment Folder
        run: |
          mkdir -p deploy
          # Copy markdown docs
          cp -r docs/* deploy/
          # Copy README
          cp README.md deploy/
          # Copy odoc output
          mkdir -p deploy/api
          if [ -d "_build/default/_doc/_html" ]; then
            cp -r _build/default/_doc/_html/* deploy/api/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4